dataviewer-default-settings:
  version: ghs-400---v0.7.5
  tabs:
  - name: Tab 1
    twoColumnLayout: true
    isGlobalTime: true
    liveMode: true
    timeRange:
      type: relative
      amount: 15
      unit: minute
    graphs:
    - left:
        category: Pressure-bar
        items:
        - P1_PRESSURE
        - P2_PRESSURE
        - P3_PRESSURE
      right:
        category: Flow-mol/s
        items:
        - FLOW_VALUE
    - left:
        category: Temperature-K
        items:
        - 50K_TEMPERATURE
        - 4K_TEMPERATURE
        - STILL_TEMPERATURE
        - MXC_TEMPERATURE
