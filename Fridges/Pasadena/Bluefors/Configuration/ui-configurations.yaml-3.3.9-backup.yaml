version: 3.3.9
application-settings:
  values:
    unitPrefixes: "y,z,a,f,p,n,µ,m,k,M,G,T,P,E,Z,Y,"
    digits: 4
    useLocale: false
    numericThresholds:
      global:
        lowerThan: 1.0E-14
        higherThan: -1.0E-14
        to: 0
diagrams-conditional-elements:
  system-diagram:
    fse--group:
      hide: true
    air--group:
      hide: true
    turbo-1:
      position:
        "y": 10
    turbo-2:
      position:
        "y": 15
    turbo-3:
      hide: true
    r1--to--b1c--curve:
      hide: true
    r1--curve--left:
      hide: true
    r1--connector-top--sm:
      hide: true
    b1c--group:
      hide: true
    b1c--or--r1-lines--line:
      hide: true
    r1--lines:
      hide: true
    b1c--no-r1--line:
      hide: true
    b1c--and--r1-lines--circle:
      hide: true
    double-cond-lines:
      hide: true
    Pump-Expandable-expand:
      hide: true
    turbo-expand:
      position:
        x: -6
    booster-b2--group:
      hide: true
  system-b1:
    fse--group:
      hide: true
    turbo-3:
      hide: true
    V204no:
      hide: true
    V205no:
      hide: true
    b1c--or--r1-lines--line:
      hide: true
  system-r1:
    r1a-bypass--group:
      hide: true
    r1b-bypass--group:
      hide: true
    r1--full:
      hide: true
